*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0e12;color:#9ca3af;font-family:'IBM Plex Mono','Menlo',monospace;font-size:13px;line-height:1.7;overflow:hidden;height:100vh}

/* Very subtle scanlines */
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 6px);
pointer-events:none;z-index:100}

#top-bar{background:#0c0e12;border-bottom:1px solid #1e2028;padding:10px 28px;display:flex;
align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:150}
#top-bar .left{color:#4b5563;font-size:11px;letter-spacing:3px}
#top-bar .right{display:flex;gap:24px;font-size:11px;color:#4b5563;letter-spacing:1px}
#top-bar .clock{color:#6ee7b7}

#terminal{padding:56px 32px 52px;height:100vh;overflow-y:auto;scroll-behavior:smooth}
#terminal::-webkit-scrollbar{width:4px}
#terminal::-webkit-scrollbar-track{background:#0c0e12}
#terminal::-webkit-scrollbar-thumb{background:#1e2028;border-radius:2px}

.line{opacity:0;animation:show 0.1s forwards;white-space:pre-wrap;word-break:break-all}
@keyframes show{to{opacity:1}}

/* Just two text colors + one accent */
.text{color:#9ca3af}
.bright{color:#d1d5db}
.accent{color:#6ee7b7}
.muted{color:#4b5563}
.err{color:#f87171}
.url{color:#6ee7b7;opacity:0.8;cursor:pointer}
.url:hover{opacity:1;text-decoration:underline}

.cursor-el{display:inline-block;width:7px;height:14px;background:#6ee7b7;animation:blink 1s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{50%{opacity:0}}

#bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#0c0e12;
border-top:1px solid #1e2028;padding:8px 28px;display:flex;justify-content:space-between;
align-items:center;z-index:150;font-size:11px;color:#4b5563;letter-spacing:1px}
#pause-label{color:#fbbf24;display:none}
</style>

function tick(){
  elapsed++;
  document.getElementById('clock').textContent =
    String(Math.floor(elapsed/60)).padStart(2,'0') + ':' + String(elapsed%60).padStart(2,'0');
}

document.addEventListener('keydown', e => {
  if(e.code==='Space'){
    e.preventDefault();
    paused=!paused;
    document.getElementById('run-label').style.display = paused?'none':'inline';
    document.getElementById('pause-label').style.display = paused?'inline':'none';
    if(paused) clearInterval(timer);
    else { timer=setInterval(tick,1000); go(); }
  }
});

T.addEventListener('click', e => {
  if(e.target.classList.contains('url')){
    const u=e.target.textContent.trim();

  }
});

let idx=0;
function go(){
  if(paused||idx>=lines.length){
    if(idx>=lines.length){
      document.getElementById('run-label').textContent='Complete';
      clearInterval(timer);
    }
    return;
  }
  const l=lines[idx];
  const div=document.createElement('div');
  div.className='line';
  if(l.c) div.classList.add(l.c);
  div.textContent=l.t;
  const pc=T.querySelector('.cursor-el');
  if(pc) pc.remove();
  T.appendChild(div);
  if(idx<lines.length-1){
    const c=document.createElement('span');
    c.className='cursor-el';
    div.appendChild(c);
  }
  T.scrollTop=T.scrollHeight;
  idx++;
  setTimeout(go, l.w || (l.t==='' ? 250 : 160));
}

timer=setInterval(tick,1000);
