});

let idx=0;
const total = lines.length;

function go(){
  if(paused||idx>=lines.length){
    if(idx>=lines.length){
      document.getElementById('run-label').textContent='COMPLETE';
      progress.style.width='100%';
      clearInterval(timer);
    }
    return;
  }
  const l=lines[idx];
  const div=document.createElement('div');
  div.className='line';
  if(l.c) div.classList.add(l.c);

  if(l.c==='l'){
    const a=document.createElement('a');
    a.className='l';
    a.href=l.t.trim();
    a.target='_blank';
    a.textContent=l.t;
    div.appendChild(a);
  } else {
    div.textContent=l.t;
  }

  const pc=T.querySelector('.cursor-el');
  if(pc) pc.remove();
  T.appendChild(div);
  if(idx<lines.length-1){
    const c=document.createElement('span');
    c.className='cursor-el';
    div.appendChild(c);
  }
  T.scrollTop=T.scrollHeight;
  progress.style.width = ((idx/total)*100)+'%';
  idx++;
  setTimeout(go, l.w || (l.t==='' ? 180 : 120));
}
